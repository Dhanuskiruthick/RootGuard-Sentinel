<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel-AI | RootGuard Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { cyber: { dark: '#050b14', card: '#0f172a' } } } } }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hero-title-gradient { background: linear-gradient(135deg, #2563eb 0%, #10b981 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .typing-cursor::after { content: '█'; animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="bg-cyber-dark text-white min-h-screen">
    <nav class="flex justify-between items-center px-8 py-6 max-w-7xl mx-auto border-b border-white/5">
        <div class="font-bold text-xl tracking-tighter">RootGuard <span class="font-light text-gray-400">Labs</span></div>
        <a href="https://rootguard-labs.vercel.app" class="text-sm font-medium text-gray-400 hover:text-white transition">Back to HQ</a>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-20 text-center">
        <div class="inline-block px-4 py-1.5 mb-8 rounded-full bg-blue-900/30 text-blue-400 text-xs font-mono font-bold tracking-widest uppercase border border-blue-900/50">
            🚀 Sentinel-AI Engine Live
        </div>
        <h1 class="text-6xl md:text-8xl font-black mb-8 hero-title-gradient">SENTINEL-AI</h1>
        
        <div class="max-w-3xl mx-auto bg-cyber-card p-2 rounded-2xl border border-slate-800 shadow-2xl flex flex-col md:flex-row items-center">
            <input type="url" id="target-url" placeholder="https://suspicious-link.com" class="flex-grow w-full bg-transparent px-6 py-4 outline-none text-lg font-mono">
            <button onclick="executeScan()" class="w-full md:w-auto px-8 py-4 bg-blue-600 hover:bg-blue-500 font-bold rounded-xl transition-all shadow-lg">INTERROGATE</button>
        </div>

        <div id="soc-terminal" class="hidden max-w-3xl mx-auto mt-8 bg-black rounded-xl border border-slate-800 text-left overflow-hidden shadow-2xl">
            <div class="bg-slate-900 px-4 py-2 flex space-x-2 border-b border-slate-800">
                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
            </div>
            <div class="p-6 font-mono text-sm space-y-2" id="terminal-output"></div>
        </div>
    </main>

    <footer class="mt-20 py-10 border-t border-white/5 text-center text-sm text-gray-500">
        © 2026 RootGuard Labs. Engineered in stealth. Built for Zero-Trust.
    </footer>

    <script>
        async function executeScan() {
            const url = document.getElementById('target-url').value;
            const terminal = document.getElementById('soc-terminal');
            const output = document.getElementById('terminal-output');
            
            if(!url) return alert("Please enter a URL");
            
            terminal.classList.remove('hidden');
            output.innerHTML = `<p class="text-blue-400">[*] Initializing Cloud Intel Sync...</p>`;
            
            try {
                // 🚀 POINTING TO YOUR LIVE RENDER BACKEND
                const apiUrl = 'https://rootguard-api.onrender.com/scan';
                
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                if(!response.ok) throw new Error("Backend Awakening...");
                const data = await response.json();

                output.innerHTML += `<p class="text-emerald-400">[+] Verdict: ${data.status}</p>`;
                output.innerHTML += `<p class="text-gray-400">Reason: ${data.reason}</p>`;
            } catch (err) {
                output.innerHTML += `<p class="text-red-500">[-] Error: ${err.message}. The server might be waking up from sleep. Try again in 30 seconds.</p>`;
            }
        }
    </script>
</body>
</html>
